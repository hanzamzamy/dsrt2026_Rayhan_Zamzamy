services:
  ic_design:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USERNAME: ${USERNAME}
        USER_UID: ${USER_UID}
        USER_GID: ${USER_GID}

    container_name  : dsrt
    image           : ic-design-zsh

    environment:
        - DISPLAY=${DISPLAY}

    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./home:/home/${USERNAME}:rw
      - ${HOST_WS_DIR}:/workspace:rw

    devices:
      - /dev/dri:/dev/dri

    network_mode: host
    privileged: true
    stdin_open: true
    tty: true
